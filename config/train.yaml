model: "yolov8m-seg.pt"

training:
  epochs: 50
  patience: 10
  imgsz: 640
  batch_size: 4

  workers: 0
  amp: false
  device: "mps"
  experiment_name: "primer_modelo"

augmentation:
  mosaic: 0.5
  close_mosaic: 5

  mixup: 0.0
  copy_paste: 0.0
  
  erasing: 0.0

  degrees: 5.0
  translate: 0.10
  scale: 0.2
  shear: 2.0
  perspective: 0.0005

  fliplr: 0.5
  flipud: 0.0

  hsv_h: 0.015
  hsv_s: 0.5
  hsv_v: 0.3